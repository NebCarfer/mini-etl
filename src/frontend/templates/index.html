<!-- src/frontend/templates/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini ETL - Modelo +1</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to right, #a1c4fd, #c2e9fb);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            background-color: #ffffffcc;
        }
        .result {
            font-weight: bold;
            font-size: 1.25rem;
            color: #0d6efd;
        }
        .error {
            color: #dc3545;
            font-weight: bold;
        }
        .btn-custom {
            background-color: #0d6efd;
            color: white;
        }
        .btn-custom:hover {
            background-color: #084298;
        }
        table {
            width: 100%;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.5rem;
            text-align: center;
        }
        th {
            background-color: #0d6efd;
            color: white;
            border-radius: 5px;
        }
        td {
            background-color: #f1f5f9;
            border-radius: 5px;
        }
        .scroll-table {
            max-height: 300px;
            overflow-y: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="card text-center">
        <h2 class="mb-4">Mini ETL</h2>

        <form method="POST" action="/submit">
            <div class="mb-3">
                <input type="number" class="form-control form-control-lg" name="number" placeholder="Ingresa un número" value="{{ input_value if input_value is not none }}">
            </div>
            <button type="submit" class="btn btn-custom btn-lg w-100">Procesar</button>
        </form>

        {% if error %}
            <div class="mt-3 error">{{ error }}</div>
        {% endif %}

        {% if output_value %}
            <div class="mt-3 result">
                Resultado: {{ output_value }}
            </div>
        {% endif %}

        <h4 class="mt-4">Últimos 100 resultados</h4>
        <div class="scroll-table">
            <table class="table table-bordered table-striped" id="results-table">
                <thead>
                    <tr><th>Input</th><th>Output</th></tr>
                </thead>
                <tbody>
                    <!-- JS llenará los datos -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- JS para actualizar resultados cada 2 segundos -->
    <script>
    async function fetchResults() {
        try {
            const res = await fetch('/results');
            const data = await res.json();
            const tbody = document.querySelector("#results-table tbody");
            tbody.innerHTML = "";
            data.results.forEach(r => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${r.input}</td><td>${r.output}</td>`;
                tbody.appendChild(tr);
            });
        } catch(e) {
            console.error("Error al traer resultados:", e);
        }
    }

    setInterval(fetchResults, 2000);
    fetchResults();
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
