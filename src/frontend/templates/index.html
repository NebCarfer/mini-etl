<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini ETL Frontend</title>
</head>
<body>
    <h1>Mini ETL Demo</h1>
    <form action="/submit" method="post">
        <label for="number">Introduce un número:</label>
        <input type="number" id="number" name="number" required>
        <button type="submit">Enviar</button>
    </form>

    {% if input_value is defined and output_value is defined %}
        <p>Entrada: {{ input_value }}</p>
        <p>Resultado: {{ output_value }}</p>
    {% endif %}
</body>
</html>
